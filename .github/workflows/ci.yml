# CI for eLanguage Center.
#
# Two jobs run on every PR + push to main:
#   - `quality` — typecheck, lint, build, and the @elc/db fuzzer +
#     @elc/ai unit suite (needs the Neon test branch).
#   - `e2e` — Playwright suspend-gate suite against a real Next dev
#     server pointed at the same Neon test branch.
#     It waits for `quality` so the two jobs do not race against the
#     same shared Neon test database.
#
# CI runs against an ephemeral Postgres service container in each job.
# Locally, packages/db/.env can still point DATABASE_URL_TEST at a Neon
# test branch; the workflow overrides it with the container URL so CI
# never touches dev/prod data and avoids slow cross-region DB calls.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   - DEV_SESSION_SECRET  — optional; defaults to the dev fallback
#                           string. Setting it makes the suspend-gate
#                           cookie signature opaque to anyone reading
#                           CI logs.
#
# Not yet wired into branch protection. Flip on once a few green runs
# build confidence.

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-flight run for the same PR/branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: typecheck · lint · build · unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/elc_test?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/elc_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm db:generate
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Unit + fuzzer
        run: pnpm test

  e2e:
    name: Playwright e2e
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/elc_test?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/elc_test?schema=public
      DEV_SESSION_SECRET: ${{ secrets.DEV_SESSION_SECRET }}
      # Force CI so playwright.config.ts disables reuseExistingServer
      # and Playwright spawns a fresh `pnpm dev` for the run.
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm db:generate
      - name: Prisma migrate deploy (test branch)
        # Direct (non-pooler) Neon URL is needed for advisory locking
        # during migrate deploy. Strip "-pooler" from the host.
        run: |
          export DATABASE_URL="${DATABASE_URL_TEST/-pooler/}"
          pnpm --filter @elc/db exec prisma migrate deploy
      - name: Build (web)
        run: pnpm --filter web build
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Run Playwright
        run: pnpm --filter web test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
